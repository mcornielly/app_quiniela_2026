x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env.docker
  volumes:
    - ./src:/var/www/html
    - ./.env.docker:/var/www/html/.env:ro
  depends_on:
    - redis

x-common-env: &common-env
  APP_ENV: local
  APP_DEBUG: "true"
  DB_CONNECTION: ${DB_CONNECTION:-sqlite}
  DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  app:
    <<: *app-base
    container_name: app_quiniela_web
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: web
      APP_URL: http://astrocopa.app.test
      PORT: 8080
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "80:8080"

  queue:
    <<: *app-base
    container_name: app_quiniela_queue
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: queue

  scheduler:
    <<: *app-base
    container_name: app_quiniela_scheduler
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: scheduler

  reverb:
    <<: *app-base
    container_name: app_quiniela_reverb
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: reverb
      PORT: 8080
    ports:
      - "8081:8080"

  redis:
    image: redis:7-alpine
    container_name: app_quiniela_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.4
    container_name: app_quiniela_mysql
    profiles: ["mysql"]
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quiniela}
      MYSQL_USER: ${MYSQL_USER:-quiniela}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-quiniela123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mysql_data:
  redis_data:
