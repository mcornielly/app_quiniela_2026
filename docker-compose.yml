x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env.docker
  volumes:
    - ./src:/var/www/html
    - ./.env.docker:/var/www/html/.env:ro
  depends_on:
    redis:
      condition: service_started
    mysql:
      condition: service_healthy

x-common-env: &common-env
  APP_ENV: local
  APP_DEBUG: "true"
  DB_CONNECTION: ${DB_CONNECTION:-mysql}
  DB_HOST: ${DB_HOST:-mysql}
  DB_DATABASE: ${DB_DATABASE:-db_quiniela_2026}
  DB_PORT: 3306
  DB_USERNAME: ${DB_USERNAME:-root}
  DB_PASSWORD: ${DB_PASSWORD:-root}
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  app:
    <<: *app-base
    container_name: app_quiniela_web
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: web
      APP_URL: http://astrocopa.app.test
      PORT: 8080
      ENABLE_VITE_DEV_SERVER: ${ENABLE_VITE_DEV_SERVER:-true}
      VITE_PORT: ${VITE_PORT:-5173}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "80:8080"
      - "5173:5173"

  queue:
    <<: *app-base
    container_name: app_quiniela_queue
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: queue

  scheduler:
    <<: *app-base
    container_name: app_quiniela_scheduler
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: scheduler

  reverb:
    <<: *app-base
    container_name: app_quiniela_reverb
    environment:
      <<: *common-env
      APP_RUNTIME_ROLE: reverb
      PORT: 8080
    ports:
      - "8081:8080"

  redis:
    image: redis:7-alpine
    container_name: app_quiniela_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.4
    container_name: app_quiniela_mysql
    environment:
      MYSQL_DATABASE: db_quiniela_2026
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
